<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>REH DOGG GP | 3D Arcade Racing</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
    }
    /* UI overlay */
    .ui {
      position: absolute;
      top: 20px;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 30px;
      pointer-events: none;
      z-index: 10;
      font-weight: bold;
      text-shadow: 2px 2px 0 #000;
      color: #ffcc33;
      font-size: 1.2rem;
    }
    .ui-panel {
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
      padding: 8px 18px;
      border-radius: 40px;
      border: 2px solid #ff2bd6;
      box-shadow: 0 0 12px rgba(255,43,214,0.5);
      pointer-events: auto;
    }
    .controls {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      background: rgba(0,0,0,0.6);
      padding: 8px;
      font-size: 0.8rem;
      color: #00f5ff;
      font-family: monospace;
      letter-spacing: 1px;
      z-index: 10;
      backdrop-filter: blur(4px);
    }
    button {
      background: linear-gradient(135deg, #ff2bd6, #ffcc33);
      border: none;
      padding: 6px 16px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      margin-left: 15px;
      pointer-events: auto;
      font-family: inherit;
    }
    button:hover {
      transform: scale(1.02);
      box-shadow: 0 0 10px #ffcc33;
    }
    .stage-name {
      color: #ff8bea;
      font-size: 1rem;
    }
    @media (max-width: 700px) {
      .ui { font-size: 0.8rem; padding: 0 15px; }
      .ui-panel { padding: 4px 12px; }
      button { padding: 4px 12px; font-size: 0.7rem; }
    }
  </style>
</head>
<body>
  <div class="ui">
    <div class="ui-panel">
      🏁 STAGE: <span id="stageName" class="stage-name">Tokyo Neon</span> (<span id="stageNum">1</span>/5)
    </div>
    <div class="ui-panel">
      🏆 LAP: <span id="currentLap">0</span> / <span id="totalLaps">3</span>
      &nbsp;&nbsp;|&nbsp;&nbsp; 🕒 BEST: <span id="bestLap">--:--</span>
      <button id="resetBtn">⟳ RESTART</button>
    </div>
  </div>
  <div class="controls">
    🎮 ARROWS or WASD → ↑ accelerate &nbsp;&nbsp; ↓ brake/reverse &nbsp;&nbsp; ← → steer
  </div>

  <!-- Import Three.js from CDN -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // --- GAME SETUP ---
    const canvas = document.createElement('canvas');
    document.body.appendChild(canvas);
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true; // shadows add depth

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a2a);
    scene.fog = new THREE.FogExp2(0x0a0a2a, 0.008);

    // Camera (chase view)
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 3.5, 8);
    camera.lookAt(0, 0, 0);

    // --- LIGHTING ---
    const ambientLight = new THREE.AmbientLight(0x223344);
    scene.add(ambientLight);
    const mainLight = new THREE.DirectionalLight(0xffaa88, 1);
    mainLight.position.set(5, 12, 8);
    mainLight.castShadow = true;
    mainLight.receiveShadow = false;
    scene.add(mainLight);
    const fillLight = new THREE.PointLight(0x44aaff, 0.5);
    fillLight.position.set(0, 4, 2);
    scene.add(fillLight);
    const backLight = new THREE.PointLight(0xffaa33, 0.4);
    backLight.position.set(0, 2, -5);
    scene.add(backLight);

    // --- TRACK PARAMETERS (simple oval) ---
    const trackMinX = -6.8;
    const trackMaxX = 6.8;
    const trackLengthFront = 38;   // Z from -38 to +38 (approx)
    const trackLengthBack = -38;
    const finishLineZ = 36;
    const startLineZ = -36;

    // --- CAR OBJECT ---
    const carGroup = new THREE.Group();
    // Body
    const bodyGeo = new THREE.BoxGeometry(1.2, 0.4, 2.2);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff3366, metalness: 0.7, roughness: 0.3 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.1;
    body.castShadow = true;
    body.receiveShadow = true;
    carGroup.add(body);
    // Roof
    const roofGeo = new THREE.BoxGeometry(0.8, 0.45, 1.1);
    const roofMat = new THREE.MeshStandardMaterial({ color: 0x44aaff });
    const roof = new THREE.Mesh(roofGeo, roofMat);
    roof.position.set(0, 0.45, -0.2);
    roof.castShadow = true;
    carGroup.add(roof);
    // Wheels
    const wheelMatBlack = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.2 });
    const wheelGeo = new THREE.CylinderGeometry(0.38, 0.38, 0.45, 16);
    const positions = [[-0.8, 0, 0.75], [0.8, 0, 0.75], [-0.8, 0, -0.75], [0.8, 0, -0.75]];
    positions.forEach(pos => {
      const wheel = new THREE.Mesh(wheelGeo, wheelMatBlack);
      wheel.rotation.z = Math.PI / 2;
      wheel.position.set(pos[0], pos[1], pos[2]);
      wheel.castShadow = true;
      carGroup.add(wheel);
    });
    // Window tint
    const windowMat = new THREE.MeshStandardMaterial({ color: 0x88aaff, emissive: 0x112233 });
    const windowGeo = new THREE.BoxGeometry(0.65, 0.25, 0.9);
    const windowMesh = new THREE.Mesh(windowGeo, windowMat);
    windowMesh.position.set(0, 0.35, -0.15);
    carGroup.add(windowMesh);
    
    scene.add(carGroup);
    let carPosition = new THREE.Vector3(0, 0.15, -35);
    let carAngle = 0;
    let carSpeed = 0;
    let steering = 0;
    carGroup.position.copy(carPosition);
    
    // --- TRACK ELEMENTS (ground, barriers, lane lines) ---
    function buildTrack(groundColor, trackColor) {
      // Ground plane
      const groundMat = new THREE.MeshStandardMaterial({ color: groundColor, roughness: 0.8, metalness: 0.1 });
      const ground = new THREE.Mesh(new THREE.PlaneGeometry(45, 130), groundMat);
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = -0.2;
      ground.receiveShadow = true;
      scene.add(ground);
      
      // Left and right barriers
      const barrierMat = new THREE.MeshStandardMaterial({ color: trackColor, metalness: 0.3 });
      const leftBarrier = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.4, 130), barrierMat);
      leftBarrier.position.set(-7.2, 0.1, 0);
      leftBarrier.castShadow = true;
      scene.add(leftBarrier);
      const rightBarrier = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.4, 130), barrierMat);
      rightBarrier.position.set(7.2, 0.1, 0);
      rightBarrier.castShadow = true;
      scene.add(rightBarrier);
      
      // Lane markings (dashed)
      const lineMat = new THREE.MeshStandardMaterial({ color: 0xffcc33 });
      for (let z = -55; z <= 55; z += 4.5) {
        const line = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.1, 1.8), lineMat);
        line.position.set(0, 0.05, z);
        line.castShadow = false;
        scene.add(line);
      }
      
      // Finish line marker
      const finishMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0x442200 });
      const finishLine = new THREE.Mesh(new THREE.BoxGeometry(14, 0.2, 0.6), finishMat);
      finishLine.position.set(0, 0.05, finishLineZ);
      scene.add(finishLine);
      
      const startLine = new THREE.Mesh(new THREE.BoxGeometry(14, 0.2, 0.6), finishMat);
      startLine.position.set(0, 0.05, startLineZ);
      scene.add(startLine);
    }
    
    // --- STAGES DEFINITIONS ---
    const stages = [
      { name: "Tokyo Neon", groundColor: 0x111122, trackColor: 0xaa44ff, ambientColor: 0x223344, lightColor: 0xff66cc, bgColor: 0x0a0a2a },
      { name: "Sahara Desert", groundColor: 0xbb9955, trackColor: 0xccaa66, ambientColor: 0xccaa77, lightColor: 0xffaa66, bgColor: 0xddbb77 },
      { name: "Alpine Snow", groundColor: 0xeeeeff, trackColor: 0xaaddff, ambientColor: 0xaaccff, lightColor: 0xffffff, bgColor: 0xaaccff },
      { name: "Forest Ridge", groundColor: 0x2a5a2a, trackColor: 0x4a7a4a, ambientColor: 0x3a6a3a, lightColor: 0xaaffaa, bgColor: 0x2a4a2a },
      { name: "Volcano Circuit", groundColor: 0x442200, trackColor: 0xaa3300, ambientColor: 0x552200, lightColor: 0xff6644, bgColor: 0x331100 }
    ];
    
    let currentStage = 0;
    let currentLap = 0;
    let totalLaps = 3;   // you can change to 5 if you like
    let lapStarted = false;
    let raceActive = true;
    
    // Helper to rebuild track for new stage
    let trackObjects = []; // to remove old track elements if needed; for simplicity we clear scene's track meshes
    function rebuildStage() {
      // Remove previous track elements (keep camera, lights, car, but remove ground and barriers and lines)
      const toRemove = [];
      scene.children.forEach(child => {
        if (child.isMesh && (child.geometry.type === 'PlaneGeometry' || 
            (child.geometry.type === 'BoxGeometry' && (child.position.x === -7.2 || child.position.x === 7.2 || child.position.y === 0.05)))) {
          toRemove.push(child);
        }
      });
      toRemove.forEach(obj => scene.remove(obj));
      
      const stage = stages[currentStage];
      scene.background = new THREE.Color(stage.bgColor);
      ambientLight.color.setHex(stage.ambientColor);
      mainLight.color.setHex(stage.lightColor);
      fillLight.color.setHex(stage.lightColor);
      
      buildTrack(stage.groundColor, stage.trackColor);
    }
    
    // --- GAME LOGIC ---
    const maxSpeed = 32;
    const acceleration = 1.6;
    const brakeDecel = 2.2;
    const turnSpeed = 2.0;
    const drag = 0.98;
    
    const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, w: false, s: false, a: false, d: false };
    
    window.addEventListener('keydown', (e) => {
      if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','s','a','d'].includes(e.key)) e.preventDefault();
    });
    window.addEventListener('keyup', (e) => {
      if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
    });
    
    let lastTimestamp = 0;
    let bestLapTime = Infinity;
    let lapStartTime = 0;
    
    function updateGame(deltaTime) {
      if (!raceActive) return;
      
      let accelerate = keys.ArrowUp || keys.w;
      let brake = keys.ArrowDown || keys.s;
      let left = keys.ArrowLeft || keys.a;
      let right = keys.ArrowRight || keys.d;
      
      if (accelerate) carSpeed = Math.min(maxSpeed, carSpeed + acceleration * deltaTime);
      else if (brake) carSpeed = Math.max(-maxSpeed/2.5, carSpeed - brakeDecel * deltaTime);
      else carSpeed *= drag;
      
      if (left) steering = Math.max(-1, steering - turnSpeed * deltaTime);
      else if (right) steering = Math.min(1, steering + turnSpeed * deltaTime);
      else steering *= 0.96;
      
      carAngle += steering * carSpeed * deltaTime * 0.9;
      carAngle = Math.min(Math.max(carAngle, -1.3), 1.3);
      carGroup.rotation.y = carAngle * 0.9;
      
      // move car
      carPosition.z += Math.cos(carAngle) * carSpeed * deltaTime;
      carPosition.x += Math.sin(carAngle) * carSpeed * deltaTime;
      
      // boundaries
      carPosition.x = Math.min(trackMaxX - 0.6, Math.max(trackMinX + 0.6, carPosition.x));
      if (carPosition.z > trackLengthFront) carPosition.z = trackLengthFront;
      if (carPosition.z < trackLengthBack) carPosition.z = trackLengthBack;
      
      carGroup.position.copy(carPosition);
      
      // Lap detection (crossing finish line forward)
      if (!lapStarted && carPosition.z > finishLineZ - 1.5 && carPosition.z < finishLineZ + 1.5 && carSpeed > 1.5) {
        lapStarted = true;
        if (currentLap === 0) lapStartTime = performance.now() / 1000;
      }
      if (lapStarted && carPosition.z < finishLineZ - 2.5) {
        // Completed a lap
        currentLap++;
        lapStarted = false;
        document.getElementById('currentLap').innerText = currentLap;
        
        const lapTimeSec = (performance.now() / 1000) - lapStartTime;
        if (currentLap === 1) lapStartTime = performance.now() / 1000;
        if (currentLap <= totalLaps && lapTimeSec < bestLapTime && currentLap > 0) {
          bestLapTime = lapTimeSec;
          const seconds = bestLapTime.toFixed(2);
          document.getElementById('bestLap').innerText = `${seconds}s`;
        }
        
        if (currentLap >= totalLaps) {
          // Stage complete!
          raceActive = false;
          currentStage++;
          if (currentStage >= stages.length) {
            currentStage = 0;
            alert("🏆🏆🏆 GRAND CHAMPION! You completed all 5 stages! Starting over from stage 1. 🏆🏆🏆");
          } else {
            alert(`⭐ Stage complete! Advancing to ${stages[currentStage].name} ⭐`);
          }
          // reset race for next stage
          resetRace(true);
        }
      }
      
      // Update UI
      document.getElementById('stageName').innerText = stages[currentStage].name;
      document.getElementById('stageNum').innerText = currentStage + 1;
      
      // Camera follow (smooth)
      const targetX = carPosition.x * 0.45;
      const targetZ = carPosition.z - 5;
      camera.position.x += (targetX - camera.position.x) * 0.08;
      camera.position.z += (targetZ - camera.position.z) * 0.08;
      camera.position.y = 2.8;
      camera.lookAt(carPosition.x, 0.1, carPosition.z);
    }
    
    function resetRace(nextStage = false) {
      if (nextStage) {
        rebuildStage();      // change environment
      }
      carSpeed = 0;
      steering = 0;
      carAngle = 0;
      carPosition.set(0, 0.15, -35);
      carGroup.position.copy(carPosition);
      carGroup.rotation.y = 0;
      currentLap = 0;
      lapStarted = false;
      raceActive = true;
      document.getElementById('currentLap').innerText = "0";
      if (!nextStage) {
        // manual restart keeps same stage
      }
    }
    
    // --- INITIAL BUILD ---
    buildTrack(stages[0].groundColor, stages[0].trackColor);
    
    // Add some simple trees/pylons for decoration (optional)
    const pylonMat = new THREE.MeshStandardMaterial({ color: 0xaa44ff });
    for (let i = -35; i <= 35; i += 12) {
      const leftPylon = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 1.2, 6), pylonMat);
      leftPylon.position.set(-7.8, 0.3, i);
      leftPylon.castShadow = true;
      scene.add(leftPylon);
      const rightPylon = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 1.2, 6), pylonMat);
      rightPylon.position.set(7.8, 0.3, i);
      rightPylon.castShadow = true;
      scene.add(rightPylon);
    }
    
    // --- ANIMATION LOOP ---
    let lastTime = performance.now();
    function animate() {
      const now = performance.now();
      let dt = Math.min(0.033, (now - lastTime) / 1000);
      lastTime = now;
      updateGame(dt);
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    
    animate();
    
    // --- RESET BUTTON (manual restart same stage) ---
    document.getElementById('resetBtn').addEventListener('click', () => {
      resetRace(false);
    });
    
    // --- WINDOW RESIZE ---
    window.addEventListener('resize', onWindowResize, false);
    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
  </script>
</body>
</html>
